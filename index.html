<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>拾字｜提笔忘字 · Day 0</title>
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f2ec">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171814">
<meta name="description" content="每天写几个你会写错的汉字，把手写能力练回来。">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="拾字">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root{ --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif; --kai:"Kaiti SC","STKaiti","KaiTi",serif;
    --bg:#e6e3db; --paper:#f4f2ec; --card:#fffdf9; --ink:#211f1b; --muted:#6f6a61; --faint:#a59f93;
    --line:#e0dbd1; --grid:#e9e4d9; --soft:#efece4; --accent:#34568a; --accentSoft:#e7ecf4;
    --known:#4f7a5b; --knownSoft:#e7eee8; --miss:#b15a43; --missSoft:#f4e7e2; --btn:#f7f5ef;
    --blankBg:rgba(255,253,249,.55); --boxLine:#d8d2c6; --adviceLine:#d6e0f0; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#171814; --paper:#202119; --card:#272820; --ink:#f4f1e9; --muted:#bcb5a8; --faint:#8e8778;
      --line:#3c3a31; --grid:#343229; --soft:#2e3027; --accent:#8fb4e8; --accentSoft:#223047;
      --known:#8bc29b; --knownSoft:#203226; --miss:#df8d75; --missSoft:#3d2923; --btn:#303227;
      --blankBg:rgba(34,48,71,.5); --boxLine:#3c3a31; --adviceLine:#31415c; } }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; margin:0; background:radial-gradient(120% 90% at 50% 0%, var(--soft) 0%, var(--bg) 70%); color:var(--ink); line-height:1.45;
    font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  body{ padding:0; }
  .wrap{ width:min(100%,430px); min-height:100svh; margin:0 auto; padding:calc(16px + env(safe-area-inset-top)) 20px calc(30px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; }
  .top{ display:flex; justify-content:space-between; align-items:center; margin:0 0 14px; padding:0 6px; flex:none; }
  .brand{ font-size:20px; font-weight:800; letter-spacing:.04em; }
  .pos{ font-size:12px; color:var(--faint); text-align:right; }
  .card{ background:var(--paper); border:1px solid transparent; border-radius:22px; padding:0 2px 18px; box-shadow:none; animation:screenIn .32s ease; }
  @keyframes screenIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
  #prompt{ min-height:78px; display:flex; justify-content:center; align-items:center; gap:5px; flex-wrap:wrap; text-align:center; font:400 34px/1.15 var(--kai); color:var(--ink); padding:8px 6px 0; }
  #prompt .given{ font-family:var(--kai); }
  #prompt .blank{ display:inline-flex; align-items:center; justify-content:center; min-width:50px; height:52px; border:2px solid var(--accent); border-radius:12px; color:var(--accent); font:600 15px/1 var(--sans); padding:0 9px; letter-spacing:.03em; background:var(--blankBg); }
  #prompt .blank.filled{ font:400 34px/1 var(--kai); letter-spacing:0; }
  .ask{ text-align:center; font-size:13px; color:var(--muted); margin-top:8px; }
  .hint{ margin:9px auto 0; max-width:350px; text-align:center; font-size:12.5px; color:var(--muted); line-height:1.6; min-height:20px; }
  .modebar{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; }
  .mode{ flex:0 0 auto; font-size:12px; padding:7px 11px; border-radius:999px; background:transparent; color:var(--muted); border-color:var(--line); }
  .pill{ font-size:12px; color:var(--faint); }
  .pill.down{ color:var(--accent); font-weight:700; }
  .modehint{ display:none; }
  .quality{ display:flex; align-items:center; justify-content:center; gap:7px; flex-wrap:wrap; margin:10px auto 0; max-width:350px; color:var(--faint); font-size:11.5px; }
  .quality button{ flex:0 0 auto; padding:6px 8px; font-size:11.5px; border-radius:999px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .quality button.active{ border-color:var(--accent); color:var(--accent); background:var(--accentSoft); font-weight:700; }
  .quality .note{ min-height:16px; flex-basis:100%; text-align:center; }
  #boxwrap{ display:flex; justify-content:center; margin:14px 0 8px; }
  .box{ position:relative; border-radius:22px; overflow:hidden; background:var(--card); border:1px solid var(--boxLine); box-shadow:inset 0 2px 10px rgba(40,36,28,.04), 0 16px 34px -28px rgba(40,36,28,.45); }
  .box .gridc, .box .hz, .box .inkc{ position:absolute; left:0; top:0; border-radius:22px; }
  .box .hz{ pointer-events:none; }
  .box .inkc{ touch-action:none; cursor:crosshair; }
  .row{ display:flex; gap:10px; margin-top:12px; }
  .row.center{ justify-content:center; }
  button{ font:600 15px var(--sans); border:1px solid transparent; border-radius:14px; padding:14px 16px;
    background:var(--btn); color:var(--ink); cursor:pointer; flex:1; transition:transform .05s, border-color .15s, background .15s, color .15s; }
  button:active{ transform:scale(.97); }
  button:disabled{ opacity:.45; }
  .primary{ background:var(--accent); color:#fff; box-shadow:0 10px 24px -12px rgba(52,86,138,.75); }
  .ghost{ flex:0 0 auto; background:transparent; color:var(--muted); border-color:var(--line); padding:8px 12px; font-size:13px; box-shadow:none; }
  .cardTop{ display:flex; justify-content:space-between; padding:0 4px; margin:0 0 -6px; }
  .exitPractice{ flex:0 0 auto; padding:7px 10px; font-size:12px; border-radius:999px; }
  #actions{ margin-top:10px; position:sticky; bottom:calc(10px + env(safe-area-inset-bottom)); z-index:3; padding-top:8px; background:linear-gradient(180deg, rgba(244,242,236,0), var(--paper) 38%); }
  #inkTools{ align-items:center; justify-content:center; }
  #inkTools button{ flex:0 0 auto; min-height:44px; }
  .revealAction{ background:transparent; color:var(--muted); border-color:var(--line); box-shadow:none; flex:.75; }
  .reveal{ display:none; margin-top:12px; text-align:center; }
  .reveal .ans{ display:flex; align-items:baseline; justify-content:center; gap:12px; }
  .reveal .big{ font-size:46px; font-weight:400; font-family:var(--kai); line-height:1; color:var(--ink); }
  .reveal .small{ font-size:15px; color:var(--muted); margin-left:0; }
  .mark{ display:none; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
  .mark button{ min-width:0; padding:13px 12px; font-size:14px; text-align:left; display:flex; align-items:center; justify-content:flex-start; }
  .mark button::before{ content:""; width:9px; height:9px; border-radius:50%; margin-right:9px; flex:none; background:currentColor; }
  .mark .fast{ background:var(--knownSoft); border:1.5px solid var(--known); color:var(--known); }
  .mark .slow,.mark .hinted{ background:var(--accentSoft); border:1.5px solid var(--accent); color:var(--accent); }
  .mark .hinted{ background:transparent; }
  .mark .miss{ background:var(--missSoft); border:1.5px solid var(--miss); color:var(--miss); }
  .revealedCard #prompt{ min-height:58px; font-size:30px; }
  .revealedCard .ask{ margin-top:4px; }
  .revealedCard #boxwrap{ margin:8px 0 2px; }
  .revealedCard .reveal{ margin-top:7px; }
  .revealedCard .mark{ gap:7px; margin-top:8px; }
  .revealedCard .mark button{ padding:10px 11px; font-size:13px; }
  @keyframes markCue{ 0%,100%{ box-shadow:0 0 0 0 rgba(52,86,138,0); } 35%{ box-shadow:0 0 0 4px var(--accentSoft); } }
  .mark.cue{ animation:markCue .85s ease 1; border-radius:14px; }
  .mark button.suggest{ outline:2.5px solid currentColor; outline-offset:2px; }
  .mark button.suggest::after{ content:"建议"; margin-left:auto; font-size:11px; opacity:.75; padding-left:6px; }
  .book,.profile,.audit,.me{ background:var(--paper); border:1px solid transparent; border-radius:22px; padding:16px 2px 18px; margin-bottom:14px; box-shadow:none; animation:screenIn .32s ease; }
  /* ---- 首页：极简 launcher（一个大圆按钮为唯一焦点，对齐设计稿） ---- */
  .home{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:12px 24px 24px; animation:screenIn .4s ease; }
  .homeGreeting{ font-size:14px; color:var(--muted); }
  .homeStatus{ margin-top:8px; font-size:17px; font-weight:300; color:var(--ink); line-height:1.5; }
  .homeStatus b{ font-weight:600; }
  .homeStatus b.due{ color:var(--miss); }
  .startRing{ flex:0 0 auto; margin:46px 0 0; width:188px; height:188px; min-width:188px; padding:0; border-radius:50%; border:1.5px solid var(--line); background:transparent; display:flex; align-items:center; justify-content:center; box-shadow:none; }
  .startRing:disabled{ opacity:1; }
  .startRingInner{ width:142px; height:142px; border-radius:50%; background:var(--accent); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow:0 16px 34px -8px rgba(52,86,138,.55); }
  .startRingInner b{ font:600 23px var(--sans); }
  .startRingInner em{ margin-top:3px; font:500 11px var(--sans); font-style:normal; opacity:.82; letter-spacing:.08em; }
  .homeFootStat{ margin-top:40px; display:flex; align-items:center; justify-content:center; gap:16px; font-size:12px; color:var(--faint); }
  .homeFootStat b{ color:var(--muted); font-weight:600; }
  .homeFootStat i{ width:3px; height:3px; border-radius:50%; background:var(--line); font-style:normal; }
  .pref{ display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; font-size:12px; color:var(--faint); }
  .prefBtns{ display:flex; gap:6px; flex:1 1 100%; justify-content:center; }
  .prefBtns button{ flex:1 1 0; padding:9px 9px; font-size:12px; border-radius:999px; background:transparent; border:1px solid var(--line); color:var(--muted); box-shadow:none; }
  .prefBtns button.active{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  .charChips{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .charChip{ flex:0 0 auto; min-width:42px; padding:8px 10px; border:1px solid var(--line); border-radius:10px; background:var(--card); font-size:24px; color:var(--accent); font-family:var(--kai); line-height:1; box-shadow:none; }
  /* ---- 我的：统计 + 易错分析入口 + 设置 + 内部工具 ---- */
  .me{ display:none; }
  .meHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
  .meHead h2{ font-size:18px; margin:0; }
  .meStats{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
  .meStat{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 0; text-align:center; }
  .meStat b{ display:block; font-size:22px; line-height:1.1; }
  .meStat b.good{ color:var(--known); }
  .meStat b.warn{ color:var(--miss); }
  .meStat span{ display:block; font-size:11px; color:var(--muted); margin-top:3px; }
  .meCard{ width:100%; margin-top:16px; text-align:left; background:var(--accentSoft); border:1px solid var(--adviceLine); border-radius:15px; padding:15px 16px; box-shadow:none; }
  .meCard .meCardTop{ display:flex; justify-content:space-between; align-items:center; }
  .meCard .meCardTop b{ font-size:13px; color:var(--accent); }
  .meCard .meCardTop span{ font-size:17px; color:var(--accent); }
  .meCard small{ display:block; color:var(--muted); font-size:12px; line-height:1.7; margin-top:7px; }
  .meLabel{ margin-top:18px; font-size:11px; color:var(--faint); letter-spacing:.06em; font-weight:600; padding:0 2px; }
  .meList{ margin-top:9px; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .meRow{ width:100%; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:14px 16px; font-size:13.5px; color:var(--ink); background:transparent; border:0; border-bottom:1px solid var(--grid); border-radius:0; box-shadow:none; text-align:left; }
  .meRow:last-child{ border-bottom:0; }
  .meRow span{ color:var(--muted); font-size:12.5px; }
  .mePref{ padding:13px 16px; border-bottom:1px solid var(--grid); }
  .mePref .pref{ justify-content:flex-start; margin-bottom:9px; }
  .book{ display:none; }
  .bookHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .bookHead h2{ font-size:18px; margin:0; }
  .bookTools{ display:flex; gap:10px; margin-bottom:12px; }
  .bookList{ display:grid; gap:8px; }
  .bookRow{ width:100%; display:flex; align-items:center; gap:12px; text-align:left; border:1px solid var(--line); border-radius:14px; background:var(--card); padding:11px; box-shadow:none; }
  .bookRow .char{ flex:0 0 46px; height:46px; border-radius:10px; border:1px solid var(--grid); background:var(--paper); display:flex; align-items:center; justify-content:center; font-size:31px; line-height:1; text-align:center; font-family:var(--kai); color:var(--accent); }
  .bookRow .meta{ min-width:0; flex:1; }
  .bookRow .meta b{ display:block; font-size:15px; }
  .bookRow .meta small{ display:block; color:var(--muted); line-height:1.45; margin-top:2px; }
  .profile{ display:none; }
  .profileHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .profileHead h2{ font-size:18px; margin:0; }
  .profileSummary{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  .profileMetric{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 6px; text-align:center; }
  .profileMetric b{ display:block; font-size:18px; }
  .profileMetric span{ color:var(--muted); font-size:12px; }
  .profileAdvice{ color:var(--muted); background:var(--accentSoft); border:1px solid var(--adviceLine); border-radius:15px; padding:13px 14px; font-size:13px; line-height:1.65; margin-bottom:12px; }
  .profileSection{ margin-top:14px; }
  .profileSection h3{ margin:0 0 8px; font-size:14px; }
  .profileRows{ display:grid; gap:7px; }
  .profileRow{ width:100%; display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; text-align:left; background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:14px; padding:11px; }
  .profileRow b{ font-size:14px; }
  .profileRow small{ display:block; color:var(--muted); line-height:1.45; margin-top:2px; }
  .profileRow em{ font-style:normal; color:var(--muted); font-size:12px; }
  .profileBar{ grid-column:1 / -1; height:5px; border-radius:999px; overflow:hidden; background:var(--line); }
  .profileBar i{ display:block; height:100%; background:var(--accent); border-radius:999px; }
  .profileChars{ margin-top:4px; }
  .audit{ display:none; }
  .auditHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .auditHead h2{ font-size:18px; margin:0; }
  .auditControls{ display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; margin-bottom:12px; }
  .auditPrefs{ display:flex; gap:6px; }
  .auditPrefs button{ padding:7px 8px; font-size:12px; border-radius:999px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .auditPrefs button.active{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  .auditSummary{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0 12px; }
  .auditMetric{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:9px 6px; text-align:center; }
  .auditMetric b{ display:block; font-size:18px; }
  .auditMetric span{ color:var(--muted); font-size:12px; }
  .auditBands{ display:grid; gap:8px; margin-bottom:12px; }
  .auditBand{ border:1px solid var(--line); border-radius:14px; padding:10px; background:var(--card); }
  .auditBand b{ display:block; font-size:13px; margin-bottom:6px; }
  .auditTags{ display:flex; flex-wrap:wrap; gap:6px; color:var(--muted); font-size:12px; }
  .auditTags span{ background:var(--soft); border-radius:999px; padding:5px 8px; }
  .auditSectionTitle{ display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:12px; margin:12px 0 8px; }
  .auditList{ display:grid; gap:7px; }
  .auditRow{ display:grid; grid-template-columns:40px 1fr; gap:8px; align-items:center; border:1px solid var(--line); border-radius:14px; padding:9px; background:var(--card); }
  .auditRow .char{ font-family:var(--kai); font-size:27px; line-height:1; color:var(--accent); text-align:center; }
  .auditRow .main{ min-width:0; }
  .auditRow .main b{ display:block; font-size:14px; }
  .auditRow .main small{ color:var(--muted); line-height:1.45; }
  .auditActions{ grid-column:1 / -1; display:flex; gap:6px; flex-wrap:wrap; }
  .auditActions button{ flex:0 0 auto; padding:6px 8px; font-size:12px; border-radius:999px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .auditActions button.active{ border-color:var(--accent); color:var(--accent); background:var(--soft); font-weight:700; }
  .empty{ color:var(--muted); font-size:13px; line-height:1.6; }
  .summary{ display:none; background:var(--paper); border:1px solid transparent; border-radius:22px; padding:16px 2px 18px; animation:screenIn .32s ease; }
  .summary h2{ font-size:20px; margin:4px 6px 12px; text-align:center; }
  .summaryHero{ display:flex; align-items:center; justify-content:center; gap:20px; margin:12px 0 18px; min-height:142px; }
  .summaryRing{ width:136px; height:136px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:conic-gradient(var(--known) 0 var(--stablePct), var(--miss) var(--stablePct) 100%); box-shadow:0 16px 36px -26px rgba(40,36,28,.55); }
  .summaryRingInner{ width:104px; height:104px; border-radius:50%; background:var(--paper); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .summaryRingInner b{ font-size:34px; line-height:1; }
  .summaryRingInner span{ margin-top:5px; color:var(--muted); font-size:12px; }
  .summaryHeroText{ max-width:170px; font-size:13px; line-height:1.65; color:var(--muted); }
  .summaryHeroText b{ display:block; font-size:15px; color:var(--ink); margin-bottom:4px; }
  .summary .list{ display:grid; gap:10px; margin:12px 0 16px; }
  .summary .note{ font-size:13px; color:var(--muted); margin:0 2px 18px; line-height:1.6; text-align:center; }
  .resultGroup{ border:1px solid var(--line); border-radius:14px; padding:10px; background:var(--card); }
  .resultHead{ display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:13px; margin-bottom:8px; }
  .resultHead b{ color:var(--ink); font-size:14px; }
  .resultItems{ display:grid; gap:6px; }
  .resultItem{ width:100%; display:grid; grid-template-columns:38px 1fr auto; align-items:center; gap:8px; text-align:left; border:1px solid transparent; border-radius:12px; background:var(--soft); padding:8px; font-size:13px; box-shadow:none; }
  .resultItem b{ font-size:27px; line-height:1; font-family:var(--kai); color:var(--accent); }
  .resultItem span{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .resultItem em{ font-style:normal; color:var(--muted); white-space:nowrap; }
  .resultItem.fast b{ color:var(--known); }
  .resultItem.hinted b,.resultItem.miss b{ color:var(--miss); }
  .roundTune{ border:1px solid var(--line); border-radius:14px; padding:10px; margin:0 0 14px; background:var(--soft); }
  .roundTuneHead{ display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:13px; margin-bottom:8px; }
  .roundTuneBtns{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .roundTuneBtns button{ padding:8px 6px; font-size:12px; background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:999px; box-shadow:none; }
  .roundTuneBtns button.active{ border-color:var(--accent); color:var(--accent); font-weight:700; }
  .summaryPrimary{ margin:0 0 12px; }
  .summaryPrimary button{ flex:1; }
  .summaryActions{ flex-wrap:wrap; }
  .wide{ flex-basis:100%; }
  /* ---- 底部导航：3 个带图标的 tab（对齐设计稿：练习 / 错题 / 我的） ---- */
  .foot{ position:sticky; bottom:0; z-index:12; margin-top:auto; padding:9px 8px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid var(--grid); background:var(--card); display:flex; justify-content:space-around; align-items:center; }
  .foot .tab{ display:flex; flex-direction:column; align-items:center; gap:5px; font:600 10px var(--sans); color:var(--faint); cursor:pointer; text-decoration:none; padding:2px 14px; -webkit-tap-highlight-color:transparent; }
  .foot .tab i{ width:20px; height:20px; border-radius:6px; border:1.5px solid currentColor; background:transparent; display:block; position:relative; }
  .foot .tab.active{ color:var(--accent); }
  .foot .tab.active i{ background:var(--accentSoft); }

<script>
// ---- 词表 → 按“字”拆成卡片（一个格子只考一个字；另一个字给出来当语境）----
// SEED 与 GROUPS 数据在 deck-data.js（1.9MB 题库独立缓存，改界面不用重下数据）
const CARDS=[];
SEED.forEach(w=>{ const chars=Array.from(w.ans), pys=w.py.split(/\s+/);
  const meta={rank:w.rank||999999, strokes:w.strokes||0, parts:w.parts||1, topic:w.topic||"综合", d:w.d||50, level:w.level||"高中", common:w.common||0, norm:w.norm||"一级", std:w.std||0, ctx:w.ctx||"dict"};
  if(Number.isInteger(w.ci)){ const ci=w.ci; CARDS.push({ word:w.ans, chars, ci, target:w.target||chars[ci], py:w.py, hint:w.hint, ...meta }); return; }
  chars.forEach((ch,ci)=>CARDS.push({ word:w.ans, chars, ci, target:ch, py:pys[ci]||w.py, hint:w.hint, ...meta })); });

// ---- 本地存储 ----
const DECK_KEY="shizi.deck.v8105.context1", OPEN_KEY="shizi.opens.v1", MEMORY_KEY="shizi.memory.v1", QUALITY_KEY="shizi.quality.v1", PREF_KEY="shizi.pref.v1", TUNING_KEY="shizi.tuning.v1";
function load(k,d){ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
let status = load(DECK_KEY, {});
let memory = load(MEMORY_KEY, {});
let quality = load(QUALITY_KEY, {});
let preference = load(PREF_KEY, "balanced");
let tuning = load(TUNING_KEY, {calibrated:false, offset:0, contextStrict:0, rounds:[]});
let auditPref = preference;
function setStatus(i,s){ status[i]=s; save(DECK_KEY,status); }
function saveMemory(){ save(MEMORY_KEY,memory); }
function saveQuality(){ save(QUALITY_KEY,quality); }
function saveTuning(){ tuning.offset=clamp(Number(tuning.offset)||0,-18,22); tuning.contextStrict=clamp(Number(tuning.contextStrict)||0,0,4); tuning.rounds=(tuning.rounds||[]).slice(-30); save(TUNING_KEY,tuning); }
function today(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
let opens = load(OPEN_KEY, []); if(!opens.includes(today())){ opens.push(today()); save(OPEN_KEY,opens); }

// ---- 出题池 ----
const BATCH=15, TOPIC_KEY="shizi.topic.v1"; let sessionDone=new Set(); let batch=[], pos=0, missedThisRound=[], roundStats=[], focusQueue=[], hintsUsedThisCard=0, cardStartedAt=0, activeMode="new", sessionTarget=0, sessionFastStreak=0, sessionMissStreak=0, roundFeedbackGiven=false, roundId=0;
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function allIndexes(){ return [...Array(CARDS.length).keys()]; }
function cardKey(i){ const c=CARDS[i]; return (c.custom?"custom:"+i+":":"base:")+c.target; }
const PREFS={ balanced:{targetShift:0,min:60,max:92, common:1, challenge:0}, practical:{targetShift:-6,min:56,max:84, common:2.2, challenge:-1}, challenge:{targetShift:10,min:70,max:104, common:.4, challenge:2} };
function prefSettings(){ return PREFS[preference] || PREFS.balanced; }
function qualityFor(i){ return quality[cardKey(i)] || {}; }
function qualityBlocked(i){ const q=qualityFor(i); return !!(q.hide || q.badWord); }
function qualityAvailable(i){ const q=qualityFor(i); if(qualityBlocked(i) || q.easy) return false; if(q.rare && preference!=="challenge") return false; return true; }
function normLevel(i){ return CARDS[i].norm || (CARDS[i].custom?"自定义":"一级"); }
function contextSource(i){ return CARDS[i].ctx || "dict"; }
function contextLabel(i){ const src=contextSource(i); return src==="fallback"?"语境待补":src==="override"?"补充语境":"词库语境"; }
function contextUsable(i){ return CARDS[i].custom || contextSource(i)!=="fallback"; }
function strictNewEligible(i){ if(CARDS[i].custom) return true; if(cardLevel(i)==="小学") return false;
  const norm=normLevel(i), d=cardDifficulty(i), common=Number(CARDS[i].common)||0, strict=Number(tuning.contextStrict)||0;
  if(!contextUsable(i)) return false;
  if(strict && common < 2.25 + strict * 0.25) return false;
  if(norm==="一级") return d>=35;
  if(norm==="二级") return d>=50 && common>=1.4;
  if(norm==="三级") return (preference==="challenge" || tuning.offset>=12) && d>=72 && common>=2.2 + strict * 0.25;
  return true; }
function qualityWeight(i){ const c=CARDS[i], q=qualityFor(i), p=prefSettings(); let score=(Number(c.common)||0)*p.common + (LEVEL_RANK[cardLevel(i)]||0)*p.challenge;
  const norm=normLevel(i), ctx=contextSource(i), strict=Number(tuning.contextStrict)||0;
  if(norm==="二级") score+=preference==="practical"?0.8:0.5;
  if(norm==="三级") score+=preference==="challenge"?1.8:-6;
  if(ctx==="fallback") score-=preference==="challenge"?2:8;
  if(strict){ score+=(Number(c.common)||0)*strict*0.45; if(ctx==="override") score-=strict*0.35; }
  if(preference==="practical") score-=Math.max(0,cardDifficulty(i)-86)*0.6;
  if(preference==="challenge") score+=cardDifficulty(i)*0.16;
  return score - (q.rare||0)*10 - (q.easy||0)*20 - (q.badWord||0)*40; }
function cardMemory(i){ const k=cardKey(i); return memory[k] || (memory[k]={seen:0, streak:0, ease:50, fast:0, slow:0, hints:0, misses:0, due:0, last:0}); }
function hasMemory(i){ const m=memory[cardKey(i)]; return !!(m && m.seen); }
function isDue(i){ const m=memory[cardKey(i)]; return !m || !m.seen || !m.due || m.due<=Date.now(); }
function reviewDue(i){ const m=memory[cardKey(i)]; return !!(m && m.seen && (!m.due || m.due<=Date.now())); }
function reviewReady(i){ return status[i]==="indeck" ? isDue(i) : reviewDue(i); }
function baseAvailable(i,respectSession=true){ return (status[i]!=="known" || hasMemory(i)) && (!respectSession || !sessionDone.has(i)); }
function reviewPool(respectSession=true){ return allIndexes().filter(i=>baseAvailable(i,respectSession) && qualityAvailable(i) && reviewReady(i)); }
function newPool(respectSession=true){ return allIndexes().filter(i=>baseAvailable(i,respectSession) && qualityAvailable(i) && !hasMemory(i) && status[i]!=="indeck" && !CARDS[i].custom && strictNewEligible(i)); }
function focusPool(respectSession=true){ return focusQueue.filter(i=>baseAvailable(i,respectSession) && !qualityBlocked(i)); }
function availablePool(){ if(activeMode==="review") return reviewPool(true); if(activeMode==="focus") return focusPool(true); return newPool(true); }
function deckCount(){ return Object.values(status).filter(s=>s==="indeck").length; }
function knownCount(){ return allIndexes().filter(i=>{ const m=memory[cardKey(i)]; return m && m.streak>=2 && status[i]!=="indeck"; }).length; }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function cardDifficulty(i){ return Number(CARDS[i].d)||50; }
const LEVEL_RANK={"小学":0,"初中":1,"高中":2,"大学":3,"专业":4}, LEVEL_TARGET={"初中":48,"高中":62,"大学":76,"专业":90};
function cardLevel(i){ return CARDS[i].level || "高中"; }
function practiceEligible(i){ return qualityAvailable(i) && (reviewReady(i) || CARDS[i].custom || strictNewEligible(i)); }
function cardTopic(i){ return CARDS[i].topic || (CARDS[i].custom?"自定义":"综合"); }
function targetDifficulty(){ const p=prefSettings(), base=68 + Math.sqrt(knownCount()/Math.max(1,CARDS.length))*18 + p.targetShift + (Number(tuning.offset)||0); return clamp(base - Math.min(deckCount(),40)*0.12, p.min, p.max); }
function personalDifficulty(i){ const m=memory[cardKey(i)]||{}, q=qualityFor(i); return clamp(cardDifficulty(i)+(reviewReady(i)?18:0)+(m.misses||0)*8+(m.hints||0)*5+(m.slow||0)*2-(m.fast||0)*3-(q.easy||0)*16+(preference==="challenge"?(q.rare||0)*4:0), 1, 115); }
function abilityLevel(i){ const d=personalDifficulty(i); if(d<58) return "简单"; if(d<82) return "中等"; return "难"; }
function abilityMeta(i){ return `${abilityLevel(i)} · 难度 ${Math.round(personalDifficulty(i))}`; }
function resetAdaptiveSession(){ sessionTarget=targetDifficulty(); sessionFastStreak=0; sessionMissStreak=0; }
function adjustSessionTarget(outcome){ if(!sessionTarget) resetAdaptiveSession(); const p=prefSettings();
  if(outcome==="fast"){ sessionFastStreak++; sessionMissStreak=0; sessionTarget+=5+Math.min(4,Math.max(0,sessionFastStreak-1)*2); }
  else if(outcome==="slow"){ sessionFastStreak=0; sessionMissStreak=0; sessionTarget-=3; }
  else if(outcome==="hinted"){ sessionFastStreak=0; sessionMissStreak=0; sessionTarget-=2; }
  else if(outcome==="miss"){ sessionFastStreak=0; sessionMissStreak++; if(sessionMissStreak>=2) sessionTarget-=6; }
  sessionTarget=clamp(Math.round(sessionTarget),p.min,p.max); return sessionTarget; }
function adaptiveScore(i,outcome,anchorIdx){ let score=Math.abs(personalDifficulty(i)-sessionTarget)*10 - qualityWeight(i);
  if(anchorIdx!=null && anchorIdx>=0){ const sameTopic=cardTopic(i)===cardTopic(anchorIdx), sameLevel=cardLevel(i)===cardLevel(anchorIdx), sameStructure=structureLabel(i)===structureLabel(anchorIdx);
    if(outcome==="miss" || outcome==="hinted"){ if(sameTopic) score-=28; if(sameStructure) score-=18; if(sameLevel) score-=10; }
    else if(outcome==="fast"){ if(sameTopic) score-=10; if(personalDifficulty(i)>personalDifficulty(anchorIdx)) score-=14; } }
  return score; }
function adaptNextCard(outcome,anchorIdx){ if(activeMode!=="new" || pos+1>=batch.length) return null; adjustSessionTarget(outcome);
  const scheduled=new Set(batch), pool=newPool(true).filter(i=>!scheduled.has(i)); if(!pool.length) return null;
  // 连续不会写 → 别继续硬推，下一张挑个最容易上手的，让这一组以「写出来了」收尾
  const next = sessionMissStreak>=2
    ? pool.sort((a,b)=>personalDifficulty(a)-personalDifficulty(b) || qualityWeight(b)-qualityWeight(a))[0]
    : pool.sort((a,b)=>adaptiveScore(a,outcome,anchorIdx)-adaptiveScore(b,outcome,anchorIdx) || personalDifficulty(b)-personalDifficulty(a))[0];
  if(next!=null) batch[pos+1]=next; return next; }
function overdueDays(i){ const m=memory[cardKey(i)]||{}; return m.due?Math.max(0,(Date.now()-m.due)/86400000):0; }
function reviewPriority(i){ const m=memory[cardKey(i)]||{}, outcome=m.lastOutcome||"", outcomeWeight={miss:42,hinted:30,slow:28,fast:-8}[outcome]||0;
  return outcomeWeight + hardCount(i)*18 + Math.max(0,100-(m.ease||50))*0.7 + overdueDays(i)*9 + personalDifficulty(i)*0.25 - (m.streak||0)*6; }
function candidateDistance(i,target){ return Math.abs(personalDifficulty(i)-target)*10 - qualityWeight(i); }
function addNearest(out, candidates, target, limit, used){ candidates.filter(i=>!used.has(i)).sort((a,b)=>candidateDistance(a,target)-candidateDistance(b,target) || personalDifficulty(b)-personalDifficulty(a)).slice(0,limit).forEach(i=>{ used.add(i); out.push(i); }); }
function addLevel(out, candidates, level, limit, used){ addNearest(out, candidates.filter(i=>cardLevel(i)===level), LEVEL_TARGET[level]||70, limit, used); }
function chooseTopic(all,target){ const buckets={}; all.forEach(i=>{ const t=cardTopic(i); (buckets[t]||(buckets[t]=[])).push(i); });

  <div class="auditActions"><button data-audit-practice="${i}">练这个</button><button data-audit-quality="easy" class="${q.easy?"active":""}">太简单</button><button data-audit-quality="rare" class="${q.rare?"active":""}">太生僻</button><button data-audit-quality="badWord" class="${q.badWord?"active":""}">词不自然</button><button data-audit-quality="hide" class="${q.hide?"active":""}">不想练</button></div>
</div>`; }
function auditData(pref=auditPref){ return withAuditPreference(pref,()=>{ const pool=newPool(false), sample=shuffle(pool).slice(0,100), batch=chooseBatch(pool);

function prefLabelFor(pref){ return ({balanced:"高频易忘", practical:"偏实用", challenge:"偏挑战"})[pref] || "高频易忘"; }

// ---- 自定义加字（抓住现实里提笔忘的那个字；卡片追加在 SEED 之后，索引稳定）----
const CUSTOM_KEY="shizi.custom.v1", ADDED_KEY="shizi.added.v1", BASE_N=CARDS.length;
let customWords = load(CUSTOM_KEY, []);
const isCJK=c=>/[一-鿿]/.test(c);
const BASE_BY_CHAR={}; for(let i=0;i<BASE_N;i++){ const t=CARDS[i].target; if(BASE_BY_CHAR[t]==null) BASE_BY_CHAR[t]=i; }
function pushWordCards(s){ const chars=Array.from(s).filter(isCJK); const start=CARDS.length;
  chars.forEach((ch,ci)=>CARDS.push({ word:chars.join(""), chars, ci, target:ch, py:"", hint:"你刚才卡壳的字", custom:true, topic:"自定义", d:76, level:"大学", rank:999999, strokes:0, parts:1, common:0, norm:"自定义", ctx:"custom" })); return [start, CARDS.length]; }
function buildCustomCards(){ CARDS.length=BASE_N; customWords.forEach(pushWordCards); }
buildCustomCards();
let addedChars = load(ADDED_KEY, null);
if(!Array.isArray(addedChars)){ addedChars=[...new Set(customWords.flatMap(w=>Array.from(w).filter(isCJK)))]; save(ADDED_KEY,addedChars); }
function customIndexOf(ch){ for(let i=BASE_N;i<CARDS.length;i++){ if(CARDS[i].target===ch) return i; } return -1; }
function unblockQuality(i){ const k=cardKey(i); if(quality[k]){ delete quality[k]; saveQuality(); } }
// 现实里提笔忘了 = 一次真实的「不会写」：记进记忆模型，让它立刻进入今日复习和错题本
function recordRealWorldMiss(i){ const c=CARDS[i], m=cardMemory(i), now=Date.now();
  m.seen=(m.seen||0)+1; m.last=now; m.lastOutcome="miss"; m.misses=(m.misses||0)+1; m.streak=0; m.ease=clamp((m.ease||50)-16,0,100);
  m.topic=c.topic; m.level=c.level; m.word=c.word; m.target=c.target; m.due=now; setStatus(i,"indeck"); }
function addWord(s){ s=(s||"").trim(); const chars=[...new Set(Array.from(s).filter(isCJK))]; if(!chars.length) return null;
  const fresh=[];
  chars.forEach(ch=>{ const base=BASE_BY_CHAR[ch], idx=base!=null?base:customIndexOf(ch);
    if(idx!=null && idx>=0){ unblockQuality(idx); recordRealWorldMiss(idx); }
    else fresh.push(ch); });
  if(fresh.length){ const word=fresh.join(""); customWords.push(word); save(CUSTOM_KEY,customWords);
    const r=pushWordCards(word); for(let i=r[0];i<r[1];i++) recordRealWorldMiss(i); }
  chars.forEach(ch=>{ if(!addedChars.includes(ch)) addedChars.push(ch); }); save(ADDED_KEY,addedChars);
  saveMemory(); return chars; }
function indexesForChars(chars){ return (chars||[]).map(ch=>{ const base=BASE_BY_CHAR[ch]; return base!=null?base:customIndexOf(ch); }).filter(i=>i!=null && i>=0); }
function insertIntoCurrentBatch(indexes){ if($("card").style.display==="none" || !Array.isArray(batch) || batch.length===0) return 0;
  const existing=new Set(batch), fresh=[...new Set(indexes)].filter(i=>!existing.has(i));
  if(!fresh.length) return 0; batch.splice(pos+1,0,...fresh); return fresh.length; }

// ---- 画布 / 笔顺 ----
const DPR=window.devicePixelRatio||1, $=id=>document.getElementById(id);
function cssVar(n,f){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||f; }
function isDark(){ return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
function hintStroke(){ return isDark()? 'rgba(156,195,239,0.55)' : 'rgba(31,58,95,0.42)'; }
// 加载瞬间视口可能还没就位（innerWidth=0），必须有下限兜底，否则写字区永久塌坏

function drawGridOn(ctx){ ctx.clearRect(0,0,S,S); ctx.fillStyle=cssVar('--card',"#fffdf7"); ctx.fillRect(0,0,S,S);

  ctx.save(); ctx.setLineDash([5,6]); ctx.beginPath();
  ctx.moveTo(S/2,4);ctx.lineTo(S/2,S-4); ctx.moveTo(4,S/2);ctx.lineTo(S-4,S/2);
  ctx.moveTo(4,4);ctx.lineTo(S-4,S-4); ctx.moveTo(S-4,4);ctx.lineTo(4,S-4); ctx.stroke(); ctx.restore(); }
function P(e){ const r=inkCanvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*(S/r.width), y:(e.clientY-r.top)*(S/r.height)}; }
function strokeTo(p){ inkCtx.strokeStyle=cssVar('--accent',"#1f3a5f"); inkCtx.lineWidth=Math.max(5,S*0.045);

function setPen(s){ penDown=s; $("pill").textContent=penDown?"落笔中":"提笔"; $("pill").classList.toggle("down",penDown); }

function initBox(){ const box=document.createElement('div'); box.className='box'; box.style.width=S+'px'; box.style.height=S+'px';

  hzEl=document.createElement('div'); hzEl.className='hz'; hzEl.style.width=S+'px'; hzEl.style.height=S+'px';

  [gridCanvas,inkCanvas].forEach(c=>{ c.style.width=S+'px'; c.style.height=S+'px'; c.width=S*DPR; c.height=S*DPR; c.getContext('2d').scale(DPR,DPR); });
  box.appendChild(gridCanvas); box.appendChild(hzEl); box.appendChild(inkCanvas); $("boxwrap").appendChild(box);
  inkCtx=inkCanvas.getContext('2d'); drawGridOn(gridCanvas.getContext('2d')); inkCanvas.style.transition='opacity .2s'; hzEl.style.transition='opacity .2s';
  inkStrokes=[]; curInkStroke=null; // 画布重建=墨迹清空，记录的笔画同步作废

function clearInk(){ inkCtx.clearRect(0,0,S,S); inkStrokes=[]; curInkStroke=null; if(inkCanvas && !revealed) inkCanvas.style.opacity='1'; }

function charLoader(char, onComplete){

  return fetch(local).then(r=>{ if(!r.ok) throw new Error("local char data"); return r.json(); })
    .catch(()=>fetch(cdn).then(r=>{ if(!r.ok) throw new Error("cdn char data"); return r.json(); }))

function warmStrokeCache(chars){ if(!navigator.onLine) return;
  [...new Set(chars||[])].forEach(ch=>fetch('data/'+encodeURIComponent(ch)+'.json').catch(()=>{})); }
function warmUpcomingStrokeCache(){ if(!navigator.onLine) return; try{
  const indexes=reviewCount()?chooseReviewBatch(reviewPool(false)):(needsCalibration()?chooseCalibrationBatch(newPool(false)):withAuditPreference(preference,()=>chooseBatch(newPool(false))));
  warmStrokeCache(indexes.map(i=>CARDS[i].target));

// ---- 写后自动比对：用户笔迹 vs medians（笔画中线），纯本地几何运算、毫秒级 ----
// 只在揭晓时判定，绝不在书写过程中反馈（写一半就提示对错=泄题，回忆练习会变成试错）。
// 判定是近似（连笔/草书会被误判），所以结果只作为「建议」预圈自评按钮，最终以用户点选为准。
let inkStrokes=[], curInkStroke=null, curMedians=null, lastVerdict=null;
function inkBegin(p){ curInkStroke=[{x:p.x,y:p.y}]; }
function inkMove(p){ if(curInkStroke) curInkStroke.push({x:p.x,y:p.y}); }
function inkEnd(){ if(!curInkStroke) return;
  // 非连续模式下无位移的点按没有留下墨迹，不算一笔；连续模式落笔会画圆点，算
  if(curInkStroke.length>=2 || continuous) inkStrokes.push(curInkStroke);
  curInkStroke=null; }
function pathLen(pts){ let l=0; for(let i=1;i<pts.length;i++) l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y); return l; }
function resamplePts(pts,n){ const src=pts.map(p=>({x:p.x,y:p.y})), out=[{x:src[0].x,y:src[0].y}];
  const I=pathLen(src)/(n-1); if(!(I>0)){ while(out.length<n) out.push({x:src[0].x,y:src[0].y}); return out; }
  let D=0;
  for(let i=1;i<src.length;i++){ const d=Math.hypot(src[i].x-src[i-1].x,src[i].y-src[i-1].y);
    if(D+d>=I && d>0){ const t=(I-D)/d, q={x:src[i-1].x+t*(src[i].x-src[i-1].x), y:src[i-1].y+t*(src[i].y-src[i-1].y)};
      out.push(q); src.splice(i,0,q); D=0; } else D+=d; }
  while(out.length<n) out.push({x:src[src.length-1].x,y:src[src.length-1].y});
  return out; }
function bboxOf(strokes){ let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  strokes.forEach(pts=>pts.forEach(p=>{ if(p.x<x1)x1=p.x; if(p.y<y1)y1=p.y; if(p.x>x2)x2=p.x; if(p.y>y2)y2=p.y; }));
  return {w:Math.max(1,x2-x1), h:Math.max(1,y2-y1), cx:(x1+x2)/2, cy:(y1+y2)/2}; }
// medians 数据坐标系：1024 单位、y 轴朝上、范围 [-124,900]（与 hanzi-writer Positioner 一致）
function mediansToCanvas(medians){ const pad=Math.round(S*0.06), k=(S-2*pad)/1024;
  return medians.map(m=>m.map(([x,y])=>({x:pad+x*k, y:pad+(900-y)*k}))); }
// 整字对齐：字写小了/偏了不该判错，把用户字包围盒对到标准字上；只允许轻微拉伸，别把字形差异也抹掉
function alignInk(strokes,tBox){ const u=bboxOf(strokes);
  let sx=tBox.w/u.w, sy=tBox.h/u.h; const s0=Math.sqrt(sx*sy);
  sx=clamp(clamp(sx,s0*0.8,s0*1.25),0.5,3); sy=clamp(clamp(sy,s0*0.8,s0*1.25),0.5,3);
  return strokes.map(pts=>pts.map(p=>({x:tBox.cx+(p.x-u.cx)*sx, y:tBox.cy+(p.y-u.cy)*sy}))); }
function strokePairCost(a,b){ const n=a.length; let f=0,r=0;
  for(let i=0;i<n;i++){ f+=Math.hypot(a[i].x-b[i].x,a[i].y-b[i].y); r+=Math.hypot(a[n-1-i].x-b[i].x,a[n-1-i].y-b[i].y); }
  f/=n; r/=n; const rev=r*1.25<f, d=rev?r:f, s=rev?a[n-1]:a[0], e=rev?a[0]:a[n-1];
  const endD=Math.max(Math.hypot(s.x-b[0].x,s.y-b[0].y), Math.hypot(e.x-b[n-1].x,e.y-b[n-1].y));
  return {d,endD}; }
// 贪心配对（不要求笔顺一致，笔顺练习由「笔顺提示」负责）；逐对卡均距/端点/长度三个阈值
function checkInk(userStrokes,medCanvas){ const N=24;
  const t=medCanvas.map(m=>resamplePts(m,N)), tLen=medCanvas.map(pathLen);
  const aligned=alignInk(userStrokes,bboxOf(medCanvas));
  const u=aligned.map(s=>resamplePts(s,N)), uLen=aligned.map(pathLen);
  const OK_D=S*0.115, OK_END=S*0.24, OK_LEN=0.55, SHORT=S*0.15;
  const all=[];
  for(let i=0;i<u.length;i++) for(let j=0;j<t.length;j++){ const c=strokePairCost(u[i],t[j]); all.push({i,j,d:c.d,endD:c.endD}); }
  all.sort((a,b)=>(a.d+0.3*a.endD)-(b.d+0.3*b.endD));
  const uUsed=new Array(u.length).fill(false), tUsed=new Array(t.length).fill(false), failed=[];
  let okCount=0;
  all.forEach(p=>{ if(uUsed[p.i]||tUsed[p.j]) return; uUsed[p.i]=true; tUsed[p.j]=true;
    const lenOff=tLen[p.j]<SHORT?0:Math.abs(uLen[p.i]-tLen[p.j])/Math.max(tLen[p.j],S*0.12);
    if(p.d<=OK_D && p.endD<=OK_END && lenOff<=OK_LEN) okCount++; else failed.push(p.i); });

function autoCheckInk(){ lastVerdict=null; inkEnd(); // 连续模式下可能还悬着没提笔的一画，先收
  if(!curMedians || !curMedians.length || !inkStrokes.length) return null;
  try{ lastVerdict=checkInk(inkStrokes, mediansToCanvas(curMedians)); }catch(e){ lastVerdict=null; }
  return lastVerdict; }
function paintInkStrokes(idxs,color){ if(!idxs || !idxs.length) return;
  inkCtx.strokeStyle=color; inkCtx.fillStyle=color; inkCtx.lineWidth=Math.max(5,S*0.045); inkCtx.lineCap="round"; inkCtx.lineJoin="round";
  idxs.forEach(i=>{ const pts=inkStrokes[i]; if(!pts||!pts.length) return;
    if(pts.length<2){ inkCtx.beginPath(); inkCtx.arc(pts[0].x,pts[0].y,Math.max(3,S*0.022),0,Math.PI*2); inkCtx.fill(); return; }
    inkCtx.beginPath(); inkCtx.moveTo(pts[0].x,pts[0].y); for(let k=1;k<pts.length;k++) inkCtx.lineTo(pts[k].x,pts[k].y); inkCtx.stroke(); }); }
function verdictCue(v){ if(!v) return "";
  if(v.status==="ok") return "自动比对：看起来写对了 ✓（机器判断，仅供参考）";
  if(v.status==="bad") return `自动比对：有 ${v.failed.length} 笔和标准写法差别较大，点「看我刚写的」可看标红`;
  const hint=v.okCount>=Math.min(v.u,v.t)*0.7?"可能是连笔或漏笔":"整体差别也比较大";
  return `自动比对：你写了 ${v.u} 笔、标准是 ${v.t} 笔（${hint}），对照看看`; }

function updateTip(){ $("tip").textContent=`笔顺提示（${groupIdx}/${groups.length}）`; if(groupIdx>=groups.length) $("tip").disabled=true; }

function promptHTML(c){ return c.chars.map((ch,i)=> i===c.ci ? `<span class="blank">${c.py||"？"}</span>` : `<span class="given">${ch}</span>`).join(""); }

  // 练习时只留题面本身（挖空词＋拼音就是「词语＋语境」，别再用文字复述——复述会把答案印出来）
  $("prompt").innerHTML=promptHTML(cur); document.querySelector(".ask").textContent="根据词语和语境，写出缺的字";
  $("hint").textContent=cur.custom?cur.hint:(activeMode==="calibrate"?"这组会用来估算你的起始难度。":"");
  $("reveal").style.display="none"; $("ans").innerHTML=""; $("markCue").textContent=""; $("peek").style.display="";
  $("mark").style.display="none"; $("qualityBox").style.display="none"; $("actions").style.display=""; $("inkTools").style.display="";
  $("fast").textContent="会写"; $("hinted").textContent="看提示写出"; $("miss").textContent="不会写"; $("slow").textContent="写错了";
  $("hinted").style.display="";
  clearInk(); setPen(false); inkCanvas.style.opacity='1'; hzEl.style.opacity='1'; showingMine=false;
  shownStrokes=0; totalStrokes=0; groups=[]; groupIdx=0; $("tip").disabled=true; $("show").disabled=true; $("done").disabled=true; $("tip").textContent="笔顺提示";
  hzEl.innerHTML=""; writer=null; revealed=false;
  curMedians=null; lastVerdict=null; ["fast","hinted","miss","slow"].forEach(id=>$(id).classList.remove("suggest"));
  function allowNoStrokeData(message){ if(token!==loadToken) return; loadToken++; $("show").disabled=false; $("done").disabled=false; $("tip").disabled=true; $("hint").textContent=(cur.custom?cur.hint+" · ":"")+message; }
  if(window.HanziWriter){
    writer=HanziWriter.create(hzEl, cur.target, { width:S, height:S, padding:Math.round(S*0.06),
      showCharacter:false, showOutline:false, strokeColor:hintStroke(), strokeAnimationSpeed:5, delayBetweenStrokes:60, charDataLoader:charLoader,
      onLoadCharDataSuccess:function(d){ if(token!==loadToken) return; loadToken++; totalStrokes=d.strokes.length; curMedians=(d.medians && d.medians.length===totalStrokes)?d.medians:null; var g=GROUPS[cur.target]; groups=(g && g.reduce((a,b)=>a+b,0)===totalStrokes)?g.slice():[totalStrokes]; groupIdx=0; shownStrokes=0; $("tip").disabled=false; $("show").disabled=false; $("done").disabled=false; updateTip(); },

  } else { $("show").disabled=false; $("done").disabled=false; } }

$("clear").onclick=()=>{ clearInk(); setPen(false); };
let animating=false, revealed=false;
$("tip").onclick=async ()=>{ if(!writer||animating||revealed||groupIdx>=groups.length) return; hintsUsedThisCard++; animating=true;
  const n=groups[groupIdx], start=shownStrokes, token=loadToken;
  // 播放期间淡化笔迹避免和提示笔画重叠；播完恢复，用户接着写
  if(inkCanvas) inkCanvas.style.opacity='0.22'; if(hzEl) hzEl.style.opacity='1';
  groupIdx++; shownStrokes+=n; updateTip();
  // 换卡（token 变）或揭晓后立刻停：残余的逐笔动画会取消揭晓动画、甚至把下一张卡的笔画提前画出来
  for(let i=0;i<n;i++){ if(token!==loadToken||revealed) break; try{ await writer.animateStroke(start+i,{}); }catch(e){} }
  animating=false;
  if(token===loadToken && !revealed && inkCanvas) inkCanvas.style.opacity='1';
};
// 两条结束路径：「写好了」= 写出来了，正确字直接显示，对照后自评；「揭晓答案」= 不会写，笔顺动画教一遍
function revealAnswer(done){
  revealed=true;
  $("card").classList.add("revealedCard");
  const noData=!writer||!totalStrokes; // 离线未缓存/加载失败：田字格画不出答案
  // 「写好了」才比对：用户声称写出来了，机器帮忙核对；「揭晓答案」是不会写，没有可判的
  const verdict=(done && !noData)?autoCheckInk():null;
  if(!noData){ try{ writer.updateColor('strokeColor', cssVar('--accent',"#1f3a5f")); writer.updateColor('radicalColor', cssVar('--accent',"#1f3a5f")); }catch(e){}
    try{ writer.hideCharacter({duration:0}); if(done) writer.showCharacter({duration:300}); else writer.animateCharacter(); }catch(e){}
    shownStrokes=totalStrokes; groupIdx=groups.length; updateTip(); }
  const blank=$("prompt").querySelector(".blank"); if(blank){ blank.textContent=cur.target; blank.classList.add("filled"); }
  // 没有笔顺数据时：答案用大字给在下方，保留用户自己的笔迹别藏
  if(noData){ setRevealView(true); $("peek").style.display="none"; } else setRevealView(false);
  $("reveal").style.display="block"; $("ans").innerHTML=(noData?`<span class="big">${cur.target}</span>`:"")+`<span class="small">${cur.word}${cur.py?` · ${cur.py}`:""}</span>`;
  $("markCue").textContent=verdictCue(verdict)||(noData?(done?"对照上面的答案看看，写对了吗？":"看着答案回忆一下，这个字算哪种？"):(done?"对照笔顺看看，写对了吗？":"顺着笔顺回忆一下，这个字算哪种？"));
  if(verdict){ paintInkStrokes(verdict.status==="count"?verdict.extra:verdict.failed, cssVar('--miss',"#b3403a"));
    if(verdict.status==="ok") $(hintsUsedThisCard>0?"hinted":"fast").classList.add("suggest");
    else if(verdict.status==="bad") $("slow").classList.add("suggest"); }
  $("hinted").style.display="";
  renderQuality();
  $("inkTools").style.display="none"; $("actions").style.display="none";
  $("mark").style.display="grid"; $("qualityBox").style.display="";
  try{ $("mark").scrollIntoView({behavior:"smooth", block:"nearest"}); }catch(e){}
  $("mark").classList.remove("cue"); void $("mark").offsetWidth; $("mark").classList.add("cue"); }
$("show").onclick=()=>revealAnswer(false);
$("done").onclick=()=>revealAnswer(true);
$("peek").onclick=()=>setRevealView(!showingMine);
$("fast").onclick=()=>recordOutcome("fast");
$("slow").onclick=()=>recordOutcome("slow");
$("hinted").onclick=()=>recordOutcome("hinted");
$("miss").onclick=()=>recordOutcome("miss");
function next(repeatSoon=false){ if(!repeatSoon) sessionDone.add(batch[pos]); pos++; if(pos<batch.length) render(); else roundSummary(); }
function chooseFocusBatch(all){ return all.slice().sort((a,b)=>personalDifficulty(b)-personalDifficulty(a)).slice(0,BATCH); }
function chooseReviewBatch(all){ return all.slice().sort((a,b)=>reviewPriority(b)-reviewPriority(a) || ((memory[cardKey(a)]||{}).due||0)-((memory[cardKey(b)]||{}).due||0) || personalDifficulty(b)-personalDifficulty(a)).slice(0,BATCH); }
function startRound(){ const p=availablePool(); if(p.length===0){ allDone(); return; } resetAdaptiveSession(); batch=activeMode==="focus"?chooseFocusBatch(p):(activeMode==="review"?chooseReviewBatch(p):(activeMode==="calibrate"?chooseCalibrationBatch(p):chooseBatch(p))); warmStrokeCache(batch.map(i=>CARDS[i].target)); pos=0; missedThisRound=[]; roundStats=[]; roundFeedbackGiven=false; roundId=Date.now()+"-"+Math.random().toString(36).slice(2,7); render(); }
function resultItem(s){ return `<button class="resultItem ${s.outcome}" data-idx="${s.idx}"><b>${s.target}</b><span>${s.word} · ${s.level}</span><em>${dueText(s.due)}</em></button>`; }
function resultGroup(outcome,label,desc){ const items=roundStats.filter(x=>x.outcome===outcome);
  return `<section class="resultGroup"><div class="resultHead"><b>${label} ${items.length}</b><span>${desc}</span></div><div class="resultItems">${items.length?items.map(resultItem).join(""):`<span class="empty">这一类没有字</span>`}</div></section>`; }
function moreLabel(remain){ if(activeMode==="review") return `继续今日复习（还剩 ${remain}）`; if(activeMode==="focus") return `继续错题（还剩 ${remain}）`; return "继续练新字"; }
function roundSummary(){ displayView("summary"); const wasCalibration=activeMode==="calibrate", calibrationNote=maybeFinishCalibration(), remain=availablePool().length;
  $("pos").textContent="本组结果";
  const count=o=>roundStats.filter(x=>x.outcome===o).length, risky=roundStats.filter(x=>x.outcome==="hinted"||x.outcome==="miss"||x.outcome==="slow").map(x=>x.target);
  const stable=count("fast"), review=count("hinted")+count("miss")+count("slow"), total=Math.max(1,roundStats.length), stablePct=Math.round(stable/total*100);
  const needsReviewFirst=(count("miss")+count("slow"))>=3 || review>=Math.ceil(total/2);
  const rough=needsReviewFirst && !wasCalibration;
  $("sumTitle").textContent=wasCalibration?"15 字试练完成":(rough?"卡住几个很正常，它们正是你来练的字":(risky.length?`这一组有 ${risky.length} 个进入错题复习`:"这一组记录好了"));
  $("summaryHero").innerHTML=`<div class="summaryRing" style="--stablePct:${stablePct}%"><div class="summaryRingInner"><b>${roundStats.length}</b><span>字练完</span></div></div><div class="summaryHeroText"><b>${review>0?`${review} 个进入错题复习`:`${stable} 个都稳了`}</b><span>${review>0?"这些字已进入错题复习，建议先把它们拿下。":"这一组都很稳，后面会自动加一点难度。"}</span></div>`;
  $("sumList").innerHTML=OUTCOMES.map(row=>resultGroup(row[0],row[1],row[2])).join("");
  const gentle=needsReviewFirst?"先把刚才不会写或写错的字拿下，比继续冲新字更顶用。":"";
  $("sumNote").textContent=`${gentle}会写 ${count("fast")} · 看提示写出 ${count("hinted")} · 不会写 ${count("miss")} · 写错了 ${count("slow")}。到期复习 ${reviewCount()} 个，错题 ${highRiskCount()} 个。${calibrationNote?` ${calibrationNote}`:""}`;
  renderRoundTune(calibrationNote);
  $("reviewRisk").parentElement.style.display=highRiskCount()>0?"flex":"none"; $("reviewRisk").style.display=highRiskCount()>0?"":"none"; $("reviewRisk").textContent=highRiskCount()?`马上复习错题（${highRiskCount()}）`:"";
  // 这一组卡得多时，别继续推新字；把焦点放回"拿下刚才卡住的字"
  $("more").style.display=(remain>0 && !needsReviewFirst)?"":"none"; $("more").textContent=remain>0?moreLabel(remain):""; }
function allDone(){ displayView("summary");
  $("pos").textContent="今日练习";
  $("sumTitle").textContent="今天的字过完了"; $("sumList").textContent="";
  $("summaryHero").innerHTML=`<div class="summaryRing" style="--stablePct:100%"><div class="summaryRingInner"><b>${memoryCount()}</b><span>已记录</span></div></div><div class="summaryHeroText"><b>没有到期复习了</b><span>每天一点，手感会慢慢回来。</span></div>`;
  $("sumNote").textContent=`已记录 ${memoryCount()} 个字。到期复习 ${reviewCount()} 个，错题 ${highRiskCount()} 个。`; $("roundTune").style.display="none"; $("more").style.display="none";
  $("reviewRisk").parentElement.style.display=highRiskCount()>0?"flex":"none"; $("reviewRisk").style.display=highRiskCount()>0?"":"none"; $("reviewRisk").textContent=highRiskCount()?`马上复习错题（${highRiskCount()}）`:""; }
$("more").onclick=startRound;
$("reviewRisk").onclick=()=>startFocus(highRiskIndexes());
$("stop").onclick=renderHome;
function openExitSheet(){ $("exitSheet").classList.add("open"); }
function closeExitSheet(){ $("exitSheet").classList.remove("open"); }
function exitCurrentRound(){ closeExitSheet(); loadToken++; animating=false; revealed=true; drawing=false; setPen(false); renderHome(); toast("已退出本组，已记录的字会保留"); }
$("exitPractice").onclick=openExitSheet;
$("exitCancel").onclick=closeExitSheet;
$("exitConfirm").onclick=exitCurrentRound;
$("exitSheet").onclick=e=>{ if(e.target===$("exitSheet")) closeExitSheet(); };
$("prefBox").onclick=e=>{ const b=e.target.closest("[data-pref]"); if(!b) return; preference=b.dataset.pref; save(PREF_KEY,preference); applyPrefUI(); };
$("qualityBox").onclick=e=>{ const b=e.target.closest("[data-quality]"); if(!b) return; recordQuality(b.dataset.quality); };
$("sumList").onclick=e=>{ const b=e.target.closest("[data-idx]"); if(b) startFocus([Number(b.dataset.idx)]); };
$("roundTune").onclick=e=>{ const b=e.target.closest("[data-round-feedback]"); if(b) recordRoundFeedback(b.dataset.roundFeedback); };
$("bookList").onclick=e=>{ const b=e.target.closest("[data-idx]"); if(b) startFocus([Number(b.dataset.idx)]); };
// ---- 底部三 tab + 首页大按钮 ----
$("startBtn").onclick=()=>{ if($("startBtn").disabled) return; startMode(reviewCount()>0?"review":"new"); };
$("tabPractice").onclick=renderHome;
$("tabBook").onclick=renderBook;
$("tabMe").onclick=renderMe;
$("meDue").onclick=()=>{ if(reviewCount()>0) startMode("review"); };
$("meRisk").onclick=()=>{ if(highRiskCount()>0) startFocus(highRiskIndexes()); };
$("meSeen").onclick=renderProfile;
$("closeBook").onclick=renderHome;
$("openProfile").onclick=renderProfile;
$("closeProfile").onclick=renderMe;
$("profilePanel").onclick=e=>{ const char=e.target.closest("[data-profile-char]"); if(char){ startFocus([Number(char.dataset.profileChar)]); return; }
  const row=e.target.closest("[data-profile-kind]"); if(row){ const list=profilePracticeIndexes(row.dataset.profileKind,row.dataset.profileValue); if(list.length) startFocus(list); } };
$("auditLink").onclick=()=>renderAudit(preference);
$("closeAudit").onclick=renderMe;
$("resampleAudit").onclick=()=>renderAudit(auditPref);
$("auditPrefs").onclick=e=>{ const b=e.target.closest("[data-pref]"); if(b) renderAudit(b.dataset.pref); };
function handleAuditListClick(e){ const practice=e.target.closest("[data-audit-practice]"); if(practice){ startFocus([Number(practice.dataset.auditPractice)]); return; }
  const q=e.target.closest("[data-audit-quality]"), row=e.target.closest("[data-idx]"); if(q && row){ recordQuality(q.dataset.auditQuality, Number(row.dataset.idx)); renderAudit(auditPref); } }
$("auditBatch").onclick=handleAuditListClick;
$("auditSample").onclick=handleAuditListClick;
$("practiceDue").onclick=()=>startMode("review");
$("practiceRisk").onclick=()=>startFocus(highRiskIndexes());

$("dataLink").onclick=()=>{ const box=$("dataBox"); if(box.style.display==="block"){ box.style.display="none"; return; }
  const last7=opens.filter(d=>{ const diff=(new Date(today())-new Date(d))/86400000; return diff>=0 && diff<7; });
  box.style.display="block"; box.innerHTML=`<b>实验用，别天天盯（盯 streak 会污染“光靠痒”这个变量）</b><br>`+
    `最近 7 天里，你主动打开过 <b>${last7.length}</b> 天 → 目标 ≥4 天<br>出题偏好：<b>${prefLabel()}</b> · 难度校准：<b>${tuningLabel()} ${tuningShiftText()}</b> · 语境严格度：<b>${Number(tuning.contextStrict)||0}</b><br>题目反馈：<b>${qualityCount()}</b> 条 · 整组反馈：<b>${(tuning.rounds||[]).length}</b> 条<br>已记录：<b>${memoryCount()}</b> 个字 · 到期复习：<b>${reviewCount()}</b> 个 · 错题：<b>${highRiskCount()}</b> 个<br>你自己加的字：<b>${addedChars.length}</b> 个<br>累计打开：${opens.length} 天`; };
let toastTimer=0;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

// ---- ＋加字面板（替代 window.prompt：输入即预览识别出的字，在库字直接带出拼音）----
function renderAddPreview(){ const chars=[...new Set(Array.from($("addInput").value).filter(isCJK))];
  $("addConfirm").disabled=!chars.length;
  $("addPreview").innerHTML=chars.length?chars.map(ch=>{ const b=BASE_BY_CHAR[ch], idx=b!=null?b:customIndexOf(ch), m=idx>=0?memory[cardKey(idx)]:null;
    return `<span class="addChip"><b>${ch}</b>${b!=null?CARDS[b].py:"生僻字·自定义卡"}${m&&m.seen?" · 已练过":""}</span>`; }).join(""):`<span>输入含汉字的词</span>`; }
function openAddSheet(){ $("addInput").value=""; renderAddPreview(); $("addSheet").classList.add("open"); $("addInput").focus(); }
function closeAddSheet(){ $("addSheet").classList.remove("open"); $("addInput").blur(); }
function confirmAdd(){ const chars=addWord($("addInput").value); if(!chars) return;
  const inserted=insertIntoCurrentBatch(indexesForChars(chars));
  closeAddSheet();
  if(inserted){ $("pos").textContent=activeMode==="calibrate"?`水平校准 · 第 ${pos+1} / ${batch.length} 个`:`第 ${pos+1} / ${batch.length} 个 · 复习 ${reviewCount()}`; toast(`已加入本次练习：${chars.join("、")}，下一题开始出现`); }
  else toast(`已加入：${chars.join("、")} · 已排进今日复习`);
  if($("summary").style.display==="block") roundSummary(); if($("mePanel").style.display==="block") renderMe(); if($("studybook").style.display==="block") renderBook(); }
$("addLink").onclick=openAddSheet;
$("addInPractice").onclick=openAddSheet;
$("addCancel").onclick=closeAddSheet;
$("addConfirm").onclick=confirmAdd;
$("addInput").oninput=renderAddPreview;
$("addInput").onkeydown=e=>{ if(e.key==="Enter" && !e.isComposing && !$("addConfirm").disabled) confirmAdd(); };
$("addSheet").onclick=e=>{ if(e.target===$("addSheet")) closeAddSheet(); };

// ---- 数据备份 / 恢复（localStorage 是唯一存储，换手机或清缓存前先导出）----
function backupPayload(){ const data={}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.indexOf("shizi.")===0) data[k]=localStorage.getItem(k); }
  return JSON.stringify({app:"shizi", version:1, date:new Date().toISOString(), data}, null, 1); }
async function exportBackup(){ const payload=backupPayload(), name=`shizi-backup-${today()}.json`;
  if(window.File && navigator.canShare){ try{ const file=new File([payload], name, {type:"application/json"});
    if(navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:"拾字备份"}); toast("备份已导出"); return; } }catch(e){ if(e && e.name==="AbortError") return; } }
  const url=URL.createObjectURL(new Blob([payload],{type:"application/json"})), a=document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000); toast("备份已下载"); }
function importBackup(file){ file.text().then(t=>{ const obj=JSON.parse(t);
    if(!obj || obj.app!=="shizi" || !obj.data || typeof obj.data!=="object") throw new Error("format");
    const keys=Object.keys(obj.data).filter(k=>k.indexOf("shizi.")===0); if(!keys.length) throw new Error("empty");
    if(!confirm(`用这份备份（${String(obj.date||"未知日期").slice(0,10)}）覆盖当前记录？`)) return;
    for(let i=localStorage.length-1;i>=0;i--){ const k=localStorage.key(i); if(k && k.indexOf("shizi.")===0) localStorage.removeItem(k); }
    keys.forEach(k=>localStorage.setItem(k, String(obj.data[k])));
    location.reload();
  }).catch(()=>alert("这个文件不是有效的拾字备份")); }
$("exportLink").onclick=()=>{ exportBackup(); };
$("importLink").onclick=()=>$("importFile").click();
$("importFile").onchange=e=>{ const f=e.target.files && e.target.files[0]; e.target.value=""; if(f) importBackup(f); };
$("resetLink").onclick=()=>{ if(confirm("清空卡组和记录，从头开始？")){ status={}; memory={}; quality={}; tuning={calibrated:false, offset:0, contextStrict:0, rounds:[]}; preference="balanced"; opens=[today()]; customWords=[]; addedChars=[]; save(DECK_KEY,status); save(MEMORY_KEY,memory); save(QUALITY_KEY,quality); saveTuning(); save(PREF_KEY,preference); save(OPEN_KEY,opens); save(CUSTOM_KEY,customWords); save(ADDED_KEY,addedChars); buildCustomCards(); localStorage.removeItem(TOPIC_KEY); sessionDone=new Set(); focusQueue=[]; renderHome(); $("dataBox").style.display="none"; } };

function applyModeUI(){ $("modeBtn").textContent=continuous?"连续模式：开":"连续模式：关";
  $("modehint").textContent=""; }
$("modeBtn").onclick=()=>{ continuous=!continuous; drawing=false; setPen(false); applyModeUI(); };

// 连续模式是给桌面鼠标准备的（点一下落笔、再点一下提笔）；触屏直接手写，不需要这个开关
if(window.matchMedia && window.matchMedia('(pointer: coarse)').matches) $("modebar").style.display="none";
initBox(); applyModeUI(); renderHome();
// 视口尺寸变化明显（旋转、分屏、加载时序）时重建写字区。正在写的卡不动（别丢笔迹）：
// 非卡片视图立即重建；卡片视图里每张新卡 render() 前都会 fitBox()，下一张自动适配
function fitBox(){ const n=idealBoxSize(); if(Math.abs(n-S)>=24){ S=n; $("boxwrap").innerHTML=""; initBox(); } }
window.addEventListener('resize',()=>{ if($("card").style.display==="none") fitBox(); });
// 系统深浅色切换时重画田字格（画布颜色是绘制时取的，不会跟着 CSS 变量自动变）
try{ window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ drawGridOn(gridCanvas.getContext('2d')); }); }catch(e){}
</script>
