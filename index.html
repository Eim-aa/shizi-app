<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>拾字｜提笔忘字 · Day 0</title>
<style>
  :root{ --bg:#f5f4ef; --card:#fffefa; --ink:#26303d; --muted:#7f7a70;
    --line:#ded4ca; --soft:#f0ece3; --accent:#1f3a5f; --known:#3f7d57; --miss:#b5544a; --btn:#ece7dc; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#1a1c1e; --card:#23262a; --ink:#e9e6dd; --muted:#9a958a;
           --line:#5a5149; --soft:#2d3034; --accent:#9cc3ef; --known:#7fc79a; --miss:#e08a80; --btn:#33373c; } }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif; }
  .wrap{ max-width:460px; margin:0 auto; padding:18px 16px 40px; }
  .top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  .brand{ font-size:17px; font-weight:700; letter-spacing:1px; }
  .pos{ font-size:13px; color:var(--muted); }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:8px; padding:20px 18px 22px; }
  #prompt{ font-size:34px; font-weight:600; letter-spacing:2px; min-height:46px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  #prompt .given{ font-family:"Kaiti SC","STKaiti","PingFang SC",serif; }
  #prompt .blank{ font-size:21px; font-weight:600; color:var(--accent); border-bottom:2px dashed var(--accent); padding:2px 10px 3px; letter-spacing:1px; }
  .ask{ font-size:13px; color:var(--muted); margin-top:6px; }
  .hint{ margin-top:8px; font-size:15px; color:var(--muted); line-height:1.5; min-height:22px; }
  .modebar{ display:flex; align-items:center; gap:10px; margin-top:14px; }
  .mode{ flex:0 0 auto; font-size:14px; padding:8px 12px; background:var(--btn); }
  .pill{ font-size:13px; color:var(--muted); }
  .pill.down{ color:var(--accent); font-weight:700; }
  .modehint{ font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; }
  .quality{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:10px; color:var(--muted); font-size:12px; }
  .quality button{ flex:0 0 auto; padding:6px 8px; font-size:12px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .quality button.active{ border-color:var(--accent); color:var(--accent); background:var(--soft); font-weight:700; }
  .quality .note{ min-height:16px; }
  #boxwrap{ display:flex; justify-content:center; margin:16px 0 6px; }
  .box{ position:relative; }
  .box .gridc, .box .hz, .box .inkc{ position:absolute; left:0; top:0; border-radius:8px; }
  .box .hz{ pointer-events:none; }
  .box .inkc{ touch-action:none; cursor:crosshair; }
  .row{ display:flex; gap:10px; margin-top:12px; }
  .row.center{ justify-content:center; }
  button{ font:inherit; font-size:16px; border:none; border-radius:8px; padding:12px 16px;
    background:var(--btn); color:var(--ink); cursor:pointer; flex:1; transition:transform .05s; }
  button:active{ transform:scale(.97); }
  button:disabled{ opacity:.5; }
  .primary{ background:var(--accent); color:#fff; }
  .ghost{ flex:0 0 auto; background:transparent; color:var(--muted); padding:8px 10px; font-size:14px; }
  .reveal{ display:none; margin-top:14px; text-align:center; }
  .reveal .big{ font-size:46px; font-weight:500; font-family:"Kaiti SC","STKaiti","PingFang SC",serif; }
  .reveal .small{ font-size:16px; color:var(--muted); margin-left:10px; }
  .mark{ display:none; gap:8px; margin-top:16px; flex-wrap:wrap; }
  .mark button{ flex:1 1 calc(50% - 8px); min-width:138px; padding:10px 8px; font-size:14px; }
  .mark .fast{ background:transparent; border:1.5px solid var(--known); color:var(--known); }
  .mark .slow,.mark .hinted{ background:transparent; border:1.5px solid var(--accent); color:var(--accent); }
  .mark .miss{ background:transparent; border:1.5px solid var(--miss); color:var(--miss); }
  .home,.book,.profile,.audit{ background:var(--card); border:1px solid var(--line); border-radius:8px; padding:18px; margin-bottom:14px; }
  .home h2{ font-size:18px; margin:0 0 12px; }
  .pref{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px; font-size:12px; color:var(--muted); }
  .prefBtns{ display:flex; gap:6px; flex:1 1 260px; }
  .prefBtns button{ padding:7px 8px; font-size:12px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .prefBtns button.active{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0 12px; }
  .stat{ border:1px solid var(--line); border-radius:8px; padding:10px 6px; text-align:center; background:var(--soft); }
  .stat b{ display:block; font-size:22px; line-height:1.1; }
  .stat span{ display:block; font-size:12px; color:var(--muted); margin-top:4px; }
  .risk{ min-height:30px; color:var(--muted); font-size:13px; line-height:1.6; margin:8px 0 14px; }
  .charChips{ display:flex; gap:8px; flex-wrap:wrap; }
  .charChip{ flex:0 0 auto; min-width:42px; padding:8px 10px; border:1px solid var(--line); background:var(--soft); font-size:24px; color:var(--ink); font-family:"Kaiti SC","STKaiti",serif; line-height:1; }
  .book{ display:none; }
  .bookHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .bookHead h2{ font-size:18px; margin:0; }
  .bookTools{ display:flex; gap:10px; margin-bottom:12px; }
  .bookList{ display:grid; gap:8px; }
  .bookRow{ width:100%; display:flex; align-items:center; gap:12px; text-align:left; border:1px solid var(--line); background:transparent; padding:10px; }
  .bookRow .char{ flex:0 0 42px; font-size:31px; line-height:1; text-align:center; font-family:"Kaiti SC","STKaiti",serif; color:var(--accent); }
  .bookRow .meta{ min-width:0; flex:1; }
  .bookRow .meta b{ display:block; font-size:15px; }
  .bookRow .meta small{ display:block; color:var(--muted); line-height:1.45; margin-top:2px; }
  .profile{ display:none; }
  .profileHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .profileHead h2{ font-size:18px; margin:0; }
  .profileSummary{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
  .profileMetric{ background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:9px 6px; text-align:center; }
  .profileMetric b{ display:block; font-size:18px; }
  .profileMetric span{ color:var(--muted); font-size:12px; }
  .profileAdvice{ color:var(--muted); background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:10px; font-size:13px; line-height:1.6; margin-bottom:12px; }
  .profileSection{ margin-top:14px; }
  .profileSection h3{ margin:0 0 8px; font-size:14px; }
  .profileRows{ display:grid; gap:7px; }
  .profileRow{ width:100%; display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; text-align:left; background:transparent; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:9px; }
  .profileRow b{ font-size:14px; }
  .profileRow small{ display:block; color:var(--muted); line-height:1.45; margin-top:2px; }
  .profileRow em{ font-style:normal; color:var(--muted); font-size:12px; }
  .profileBar{ grid-column:1 / -1; height:5px; border-radius:999px; overflow:hidden; background:var(--line); }
  .profileBar i{ display:block; height:100%; background:var(--accent); border-radius:999px; }
  .profileChars{ margin-top:4px; }
  .audit{ display:none; }
  .auditHead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
  .auditHead h2{ font-size:18px; margin:0; }
  .auditControls{ display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; margin-bottom:12px; }
  .auditPrefs{ display:flex; gap:6px; }
  .auditPrefs button{ padding:7px 8px; font-size:12px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .auditPrefs button.active{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }
  .auditSummary{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0 12px; }
  .auditMetric{ background:var(--soft); border:1px solid var(--line); border-radius:8px; padding:9px 6px; text-align:center; }
  .auditMetric b{ display:block; font-size:18px; }
  .auditMetric span{ color:var(--muted); font-size:12px; }
  .auditBands{ display:grid; gap:8px; margin-bottom:12px; }
  .auditBand{ border:1px solid var(--line); border-radius:8px; padding:9px; }
  .auditBand b{ display:block; font-size:13px; margin-bottom:6px; }
  .auditTags{ display:flex; flex-wrap:wrap; gap:6px; color:var(--muted); font-size:12px; }
  .auditTags span{ background:var(--soft); border-radius:8px; padding:5px 7px; }
  .auditSectionTitle{ display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:12px; margin:12px 0 8px; }
  .auditList{ display:grid; gap:7px; }
  .auditRow{ display:grid; grid-template-columns:34px 1fr; gap:8px; align-items:center; border:1px solid var(--line); border-radius:8px; padding:8px; }
  .auditRow .char{ font-family:"Kaiti SC","STKaiti",serif; font-size:27px; line-height:1; color:var(--accent); text-align:center; }
  .auditRow .main{ min-width:0; }
  .auditRow .main b{ display:block; font-size:14px; }
  .auditRow .main small{ color:var(--muted); line-height:1.45; }
  .auditActions{ grid-column:1 / -1; display:flex; gap:6px; flex-wrap:wrap; }
  .auditActions button{ flex:0 0 auto; padding:6px 8px; font-size:12px; background:transparent; border:1px solid var(--line); color:var(--muted); }
  .auditActions button.active{ border-color:var(--accent); color:var(--accent); background:var(--soft); font-weight:700; }
  .empty{ color:var(--muted); font-size:13px; line-height:1.6; }
  .summary{ display:none; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:20px 18px; }
  .summary h2{ font-size:18px; margin:0 0 10px; text-align:left; }
  .summary .list{ display:grid; gap:10px; margin:12px 0 16px; }
  .summary .note{ font-size:13px; color:var(--muted); margin-bottom:18px; line-height:1.5; }
  .resultGroup{ border:1px solid var(--line); border-radius:8px; padding:10px; background:transparent; }
  .resultHead{ display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:13px; margin-bottom:8px; }
  .resultHead b{ color:var(--ink); font-size:14px; }
  .resultItems{ display:grid; gap:6px; }
  .resultItem{ width:100%; display:grid; grid-template-columns:38px 1fr auto; align-items:center; gap:8px; text-align:left; border:1px solid transparent; background:var(--soft); padding:8px; font-size:13px; }
  .resultItem b{ font-size:27px; line-height:1; font-family:"Kaiti SC","STKaiti",serif; color:var(--accent); }
  .resultItem span{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .resultItem em{ font-style:normal; color:var(--muted); white-space:nowrap; }
  .resultItem.fast b{ color:var(--known); }
  .resultItem.hinted b,.resultItem.miss b{ color:var(--miss); }
  .summaryActions{ flex-wrap:wrap; }
  .wide{ flex-basis:100%; }
  .foot{ margin-top:26px; text-align:center; font-size:12px; color:var(--muted); }
  .foot a{ color:var(--muted); cursor:pointer; text-decoration:underline; margin:0 8px; }
  .data{ display:none; margin-top:14px; background:var(--card); border:1px dashed var(--line); border-radius:8px; padding:14px; font-size:13px; color:var(--muted); line-height:1.7; text-align:left; }
  @media (max-width:380px){ .resultItem{ grid-template-columns:34px 1fr; } .resultItem em{ grid-column:2; } .prefBtns,.auditPrefs{ flex-basis:100%; } .auditControls{ grid-template-columns:1fr; } .profileSummary{ grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="brand">拾字</div><div class="pos" id="pos"></div></div>

  <div class="home" id="home">
    <h2>今日练习</h2>
    <div class="pref" id="prefBox"><span>出题偏好</span><div class="prefBtns">
      <button data-pref="balanced">高频易忘</button>
      <button data-pref="practical">偏实用</button>
      <button data-pref="challenge">偏挑战</button>
    </div></div>
    <div class="stats">
      <div class="stat"><b id="dueStat">0</b><span>到期复习</span></div>
      <div class="stat"><b id="riskStat">0</b><span>重点字</span></div>
      <div class="stat"><b id="seenStat">0</b><span>已记录</span></div>
    </div>
    <div class="risk" id="riskList"></div>
    <div class="row"><button class="primary" id="startReview">今日复习</button><button id="startNew">练新字</button></div>
    <div class="row"><button id="openBook">重点字本</button><button id="openProfile">弱点画像</button></div>
  </div>

  <div class="card" id="card" style="display:none">
    <div id="prompt"></div>
    <div class="ask">在格子里写出虚线框中拼音对应的字 ✍️</div>
    <div class="hint" id="hint"></div>
    <div class="quality" id="qualityBox"><span>题目反馈</span><button data-quality="easy">太简单</button><button data-quality="rare">太生僻</button><button data-quality="badWord">词不自然</button><button data-quality="hide">不想练</button><span class="note" id="qualityNote"></span></div>

    <div class="modebar"><button class="mode" id="modeBtn">✍️ 连续模式：开</button><span class="pill" id="pill">✋ 提笔</span></div>
    <div class="modehint" id="modehint"></div>

    <div id="boxwrap"></div>
    <div class="row"><button class="ghost" id="clear">清除</button></div>
    <div class="row" id="actions">
      <button id="tip" disabled>提示·下一个部件</button>
      <button class="primary" id="show" disabled>揭晓答案</button>
    </div>
    <div class="reveal" id="reveal"><div class="ans" id="ans"></div>
      <button class="ghost" id="peek">👁 看我刚写的</button></div>
    <div class="row mark" id="mark">
      <button class="fast" id="fast">秒会</button>
      <button class="slow" id="slow">想起后写出</button>
      <button class="hinted" id="hinted">看提示写出</button>
      <button class="miss" id="miss">没写出来</button>
    </div>
  </div>

  <div class="summary" id="summary">
    <h2 id="sumTitle"></h2><div class="list" id="sumList"></div><div class="note" id="sumNote"></div>
    <div class="row center summaryActions"><button class="primary" id="reviewRisk">马上复习重点字</button><button id="more">再来一组</button><button class="wide" id="stop">返回今日练习</button></div>
  </div>

  <div class="book" id="studybook">
    <div class="bookHead"><h2>重点字本</h2><button class="ghost" id="closeBook">返回</button></div>
    <div class="bookTools"><button id="practiceDue">练到期</button><button class="primary" id="practiceRisk">练重点字</button></div>
    <div class="bookList" id="bookList"></div>
  </div>

  <div class="profile" id="profilePanel">
    <div class="profileHead"><h2>弱点画像</h2><button class="ghost" id="closeProfile">返回</button></div>
    <div class="profileSummary" id="profileSummary"></div>
    <div class="profileAdvice" id="profileAdvice"></div>
    <div class="profileSection"><h3>容易卡住的主题</h3><div class="profileRows" id="profileTopics"></div></div>
    <div class="profileSection"><h3>难度层和结构</h3><div class="profileRows" id="profileLevels"></div></div>
    <div class="profileSection"><h3>重点字</h3><div class="profileChars" id="profileChars"></div></div>
  </div>

  <div class="audit" id="auditPanel">
    <div class="auditHead"><h2>题库质检</h2><button class="ghost" id="closeAudit">返回</button></div>
    <div class="auditControls">
      <div class="auditPrefs" id="auditPrefs">
        <button data-pref="balanced">高频易忘</button>
        <button data-pref="practical">偏实用</button>
        <button data-pref="challenge">偏挑战</button>
      </div>
      <button id="resampleAudit">重新抽样</button>
    </div>
    <div class="auditSummary" id="auditSummary"></div>
    <div class="auditBands" id="auditBands"></div>
    <div class="auditSectionTitle"><b>下一组预览</b><span id="auditBatchNote"></span></div>
    <div class="auditList" id="auditBatch"></div>
    <div class="auditSectionTitle"><b>100 字样本</b><span>展示前 30 个</span></div>
    <div class="auditList" id="auditSample"></div>
  </div>

  <div class="foot"><a id="addLink">＋加字</a><a id="bookLink">重点字本</a><a id="profileLink">弱点画像</a><a id="auditLink">题库质检</a><a id="dataLink">实验数据</a><a id="resetLink">重置卡组</a><div class="data" id="dataBox"></div></div>
</div>

<script src="hanzi-writer.min.js"></script>

function load(k,d){ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch(e){ return d; } }
function save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function allIndexes(){ return [...Array(CARDS.length).keys()]; }
function cardKey(i){ const c=CARDS[i]; return (c.custom?"custom:"+i+":":"base:")+c.target; }
const PREFS={ balanced:{targetShift:0,min:60,max:92, common:1, challenge:0}, practical:{targetShift:-6,min:56,max:84, common:2.2, challenge:-1}, challenge:{targetShift:10,min:70,max:104, common:.4, challenge:2} };
function prefSettings(){ return PREFS[preference] || PREFS.balanced; }
function qualityFor(i){ return quality[cardKey(i)] || {}; }
function qualityBlocked(i){ const q=qualityFor(i); return !!(q.hide || q.badWord); }
function qualityAvailable(i){ const q=qualityFor(i); if(qualityBlocked(i) || q.easy) return false; if(q.rare && preference!=="challenge") return false; return true; }
function qualityWeight(i){ const c=CARDS[i], q=qualityFor(i), p=prefSettings(); let score=(Number(c.common)||0)*p.common + (LEVEL_RANK[cardLevel(i)]||0)*p.challenge;
  if(preference==="practical") score-=Math.max(0,cardDifficulty(i)-86)*0.6;
  if(preference==="challenge") score+=cardDifficulty(i)*0.16;
  return score - (q.rare||0)*10 - (q.easy||0)*20 - (q.badWord||0)*40; }
function cardMemory(i){ const k=cardKey(i); return memory[k] || (memory[k]={seen:0, streak:0, ease:50, fast:0, slow:0, hints:0, misses:0, due:0, last:0}); }
function hasMemory(i){ const m=memory[cardKey(i)]; return !!(m && m.seen); }
function isDue(i){ const m=memory[cardKey(i)]; return !m || !m.seen || !m.due || m.due<=Date.now(); }
function reviewDue(i){ const m=memory[cardKey(i)]; return !!(m && m.seen && (!m.due || m.due<=Date.now())); }
function reviewReady(i){ return status[i]==="indeck" ? isDue(i) : reviewDue(i); }
function baseAvailable(i,respectSession=true){ return (status[i]!=="known" || hasMemory(i)) && (!respectSession || !sessionDone.has(i)); }
function reviewPool(respectSession=true){ return allIndexes().filter(i=>baseAvailable(i,respectSession) && qualityAvailable(i) && reviewReady(i)); }
function newPool(respectSession=true){ return allIndexes().filter(i=>baseAvailable(i,respectSession) && qualityAvailable(i) && !hasMemory(i) && status[i]!=="indeck" && !CARDS[i].custom && cardLevel(i)!=="小学"); }
function focusPool(respectSession=true){ return focusQueue.filter(i=>baseAvailable(i,respectSession) && !qualityBlocked(i)); }
function availablePool(){ if(activeMode==="review") return reviewPool(true); if(activeMode==="focus") return focusPool(true); return newPool(true); }
function deckCount(){ return Object.values(status).filter(s=>s==="indeck").length; }
function knownCount(){ return allIndexes().filter(i=>{ const m=memory[cardKey(i)]; return m && m.streak>=2 && status[i]!=="indeck"; }).length; }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function cardDifficulty(i){ return Number(CARDS[i].d)||50; }

    const adult=items.filter(i=>(LEVEL_RANK[cardLevel(i)]||0)>=2).length, common=items.reduce((s,i)=>s+(Number(CARDS[i].common)||0),0)/items.length;

  inkCanvas.addEventListener('pointermove',e=>{ const p=P(e);
    if(continuous){ if(penDown){ strokeTo(p); } else { last=p; } e.preventDefault(); return; }
    if(drawing){ strokeTo(p); e.preventDefault(); } });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>inkCanvas.addEventListener(ev,()=>{ if(!continuous) drawing=false; })); }
function clearInk(){ inkCtx.clearRect(0,0,S,S); }

function charLoader(char, onComplete){
  fetch('data/'+encodeURIComponent(char)+'.json').then(r=>{ if(!r.ok) throw 0; return r.json(); }).then(onComplete)
  .catch(()=> fetch('https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0.1/'+encodeURIComponent(char)+'.json').then(r=>r.json()).then(onComplete)); }

function updateTip(){ $("tip").textContent = groupIdx<groups.length ? `提示·下一个部件（${groupIdx}/${groups.length}）` : `部件已全部显示（${groups.length}）`; }

// ---- 流程 ----
function promptHTML(c){ return c.chars.map((ch,i)=> i===c.ci ? `<span class="blank">${c.py}</span>` : `<span class="given">${ch}</span>`).join(""); }
function render(){ cur=CARDS[batch[pos]];
  displayView("card");
  hintsUsedThisCard=0; cardStartedAt=Date.now();
  $("pos").textContent=`第 ${pos+1} / ${batch.length} 个 · 复习 ${reviewCount()}`;
  $("prompt").innerHTML=promptHTML(cur); $("hint").textContent=cur.hint;
  renderQuality();
  $("reveal").style.display="none"; $("ans").innerHTML="";
  $("mark").style.display="none"; $("actions").style.display="";
  clearInk(); setPen(false); inkCanvas.style.opacity='1'; hzEl.style.opacity='1'; showingMine=false;
  shownStrokes=0; totalStrokes=0; groups=[]; groupIdx=0; $("tip").disabled=true; $("show").disabled=true; $("tip").textContent="提示·下一个部件";
  hzEl.innerHTML=""; writer=null;
  if(window.HanziWriter){
    writer=HanziWriter.create(hzEl, cur.target, { width:S, height:S, padding:Math.round(S*0.06),
      showCharacter:false, showOutline:false, strokeColor:hintStroke(), strokeAnimationSpeed:5, delayBetweenStrokes:60, charDataLoader:charLoader,
      onLoadCharDataSuccess:function(d){ totalStrokes=d.strokes.length; var g=GROUPS[cur.target]; groups=(g && g.reduce((a,b)=>a+b,0)===totalStrokes)?g.slice():[totalStrokes]; groupIdx=0; shownStrokes=0; $("tip").disabled=false; $("show").disabled=false; updateTip(); },
      onLoadCharDataError:function(){ $("show").disabled=false; } });
  } else { $("show").disabled=false; } }

$("clear").onclick=()=>{ clearInk(); setPen(false); };
let animating=false;
$("tip").onclick=async ()=>{ if(!writer||animating||groupIdx>=groups.length) return; hintsUsedThisCard++; animating=true;
  const n=groups[groupIdx], start=shownStrokes; groupIdx++; shownStrokes+=n; updateTip();
  for(let i=0;i<n;i++){ try{ await writer.animateStroke(start+i,{}); }catch(e){} }
  animating=false; };
$("show").onclick=()=>{ if(writer){ try{ writer.updateColor('strokeColor', cssVar('--accent',"#1f3a5f")); writer.updateColor('radicalColor', cssVar('--accent',"#1f3a5f")); }catch(e){}
    try{ writer.hideCharacter({duration:0}); }catch(e){} writer.animateCharacter(); shownStrokes=totalStrokes; groupIdx=groups.length; updateTip(); }
  setRevealView(false);
  $("reveal").style.display="block"; $("ans").innerHTML=`<span class="big">${cur.target}</span><span class="small">${cur.word}</span>`;
  $("actions").style.display="none"; $("mark").style.display="flex"; };
$("peek").onclick=()=>setRevealView(!showingMine);
$("fast").onclick=()=>recordOutcome("fast");
$("slow").onclick=()=>recordOutcome("slow");
$("hinted").onclick=()=>recordOutcome("hinted");
$("miss").onclick=()=>recordOutcome("miss");
function next(repeatSoon=false){ if(!repeatSoon) sessionDone.add(batch[pos]); pos++; if(pos<batch.length) render(); else roundSummary(); }
function chooseFocusBatch(all){ return all.slice().sort((a,b)=>personalDifficulty(b)-personalDifficulty(a)).slice(0,BATCH); }
function startRound(){ const p=availablePool(); if(p.length===0){ allDone(); return; } batch=activeMode==="focus"?chooseFocusBatch(p):chooseBatch(p); pos=0; missedThisRound=[]; roundStats=[]; render(); }
function resultItem(s){ return `<button class="resultItem ${s.outcome}" data-idx="${s.idx}"><b>${s.target}</b><span>${s.word} · ${s.level}</span><em>${dueText(s.due)}</em></button>`; }
function resultGroup(outcome,label,desc){ const items=roundStats.filter(x=>x.outcome===outcome);
  return `<section class="resultGroup"><div class="resultHead"><b>${label} ${items.length}</b><span>${desc}</span></div><div class="resultItems">${items.length?items.map(resultItem).join(""):`<span class="empty">这一类没有字</span>`}</div></section>`; }
function moreLabel(remain){ if(activeMode==="review") return `继续今日复习（还剩 ${remain}）`; if(activeMode==="focus") return `继续重点字（还剩 ${remain}）`; return "再来一组"; }
function roundSummary(){ displayView("summary"); const remain=availablePool().length;
  $("pos").textContent="本组结果";
  const count=o=>roundStats.filter(x=>x.outcome===o).length, risky=roundStats.filter(x=>x.outcome==="hinted"||x.outcome==="miss").map(x=>x.target);
  $("sumTitle").textContent=risky.length?`这一组有 ${risky.length} 个进入重点复习`:"这一组记录好了";
  $("sumList").innerHTML=OUTCOMES.map(row=>resultGroup(row[0],row[1],row[2])).join("");
  $("sumNote").textContent=`秒会 ${count("fast")} · 想起后写出 ${count("slow")} · 看提示写出 ${count("hinted")} · 没写出来 ${count("miss")}。到期复习 ${reviewCount()} 个，重点字 ${highRiskCount()} 个。`;
  $("reviewRisk").style.display=highRiskCount()>0?"":"none"; $("reviewRisk").textContent=highRiskCount()?`马上复习重点字（${highRiskCount()}）`:"";
  $("more").style.display=remain>0?"":"none"; $("more").textContent=remain>0?moreLabel(remain):""; }
function allDone(){ displayView("summary");
  $("pos").textContent="今日练习";
  $("sumTitle").textContent="今天的字过完了"; $("sumList").textContent="";
  $("sumNote").textContent=`已记录 ${memoryCount()} 个字。到期复习 ${reviewCount()} 个，重点字 ${highRiskCount()} 个。`; $("more").style.display="none";
  $("reviewRisk").style.display=highRiskCount()>0?"":"none"; $("reviewRisk").textContent=highRiskCount()?`马上复习重点字（${highRiskCount()}）`:""; }
$("more").onclick=startRound;
$("reviewRisk").onclick=()=>startFocus(highRiskIndexes());
$("stop").onclick=renderHome;
$("prefBox").onclick=e=>{ const b=e.target.closest("[data-pref]"); if(!b) return; preference=b.dataset.pref; save(PREF_KEY,preference); renderHome(); };
$("qualityBox").onclick=e=>{ const b=e.target.closest("[data-quality]"); if(!b) return; recordQuality(b.dataset.quality); };
$("riskList").onclick=e=>{ const b=e.target.closest("[data-idx]"); if(b) startFocus([Number(b.dataset.idx)]); };
$("sumList").onclick=e=>{ const b=e.target.closest("[data-idx]"); if(b) startFocus([Number(b.dataset.idx)]); };
$("bookList").onclick=e=>{ const b=e.target.closest("[data-idx]"); if(b) startFocus([Number(b.dataset.idx)]); };
$("openBook").onclick=renderBook;
$("bookLink").onclick=renderBook;
$("closeBook").onclick=renderHome;
$("openProfile").onclick=renderProfile;
$("profileLink").onclick=renderProfile;
$("closeProfile").onclick=renderHome;
$("profilePanel").onclick=e=>{ const char=e.target.closest("[data-profile-char]"); if(char){ startFocus([Number(char.dataset.profileChar)]); return; }
  const row=e.target.closest("[data-profile-kind]"); if(row){ const list=profilePracticeIndexes(row.dataset.profileKind,row.dataset.profileValue); if(list.length) startFocus(list); } };
$("auditLink").onclick=()=>renderAudit(preference);
$("closeAudit").onclick=renderHome;
$("resampleAudit").onclick=()=>renderAudit(auditPref);
$("auditPrefs").onclick=e=>{ const b=e.target.closest("[data-pref]"); if(b) renderAudit(b.dataset.pref); };
function handleAuditListClick(e){ const practice=e.target.closest("[data-audit-practice]"); if(practice){ startFocus([Number(practice.dataset.auditPractice)]); return; }
  const q=e.target.closest("[data-audit-quality]"), row=e.target.closest("[data-idx]"); if(q && row){ recordQuality(q.dataset.auditQuality, Number(row.dataset.idx)); renderAudit(auditPref); } }
$("auditBatch").onclick=handleAuditListClick;
$("auditSample").onclick=handleAuditListClick;
$("practiceDue").onclick=()=>startMode("review");
$("practiceRisk").onclick=()=>startFocus(highRiskIndexes());

$("dataLink").onclick=()=>{ const box=$("dataBox"); if(box.style.display==="block"){ box.style.display="none"; return; }
  const last7=opens.filter(d=>{ const diff=(new Date(today())-new Date(d))/86400000; return diff>=0 && diff<7; });
  box.style.display="block"; box.innerHTML=`<b>实验用，别天天盯（盯 streak 会污染“光靠痒”这个变量）</b><br>`+
    `最近 7 天里，你主动打开过 <b>${last7.length}</b> 天 → 目标 ≥4 天<br>出题偏好：<b>${prefLabel()}</b> · 题目反馈：<b>${qualityCount()}</b> 条<br>已记录：<b>${memoryCount()}</b> 个字 · 到期复习：<b>${reviewCount()}</b> 个 · 重点字：<b>${highRiskCount()}</b> 个<br>你自己加的字：<b>${customCount()}</b> 个<br>累计打开：${opens.length} 天`; };
$("addLink").onclick=()=>{ const chars=addWord(window.prompt("刚才提笔忘了哪个字？\n输入这个字，或它所在的词（如「蘸料」）：")||"");
  if(chars){ alert(`已加入卡组：${chars.join("")}\n下次优先考你这些。`); if($("summary").style.display==="block") roundSummary(); if($("home").style.display==="block") renderHome(); if($("studybook").style.display==="block") renderBook(); }
  else alert("没识别到汉字"); };
$("resetLink").onclick=()=>{ if(confirm("清空卡组和记录，从头开始？")){ status={}; memory={}; quality={}; preference="balanced"; opens=[today()]; save(DECK_KEY,status); save(MEMORY_KEY,memory); save(QUALITY_KEY,quality); save(PREF_KEY,preference); save(OPEN_KEY,opens); localStorage.removeItem(TOPIC_KEY); sessionDone=new Set(); renderHome(); $("dataBox").style.display="none"; } };

function applyModeUI(){ $("modeBtn").textContent=continuous?"✍️ 连续模式：开":"✍️ 连续模式：关";
  $("modehint").textContent=continuous?"点一下落笔 → 滑动就写（不用按住）→ 再点一下提笔。":"手指/笔按住滑动就写，松手即抬笔（真触屏推荐）。"; }
$("modeBtn").onclick=()=>{ continuous=!continuous; drawing=false; setPen(false); applyModeUI(); };

$("startReview").onclick=()=>startMode("review");
$("startNew").onclick=()=>startMode("new");
initBox(); applyModeUI(); renderHome();
</script>
</body>
</html>
